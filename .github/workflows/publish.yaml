name: Publish
on:
  push:
    tags:
      - '*.*.*.*'
jobs:
  Build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true
          
      - name: Get Environment Variables
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/', ''

          "tag=$tag" | Out-File -Append -FilePath $Env:GITHUB_ENV
          
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud Latest
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore Nuget Packages for RSR
        run: dotnet restore RotationSolver/RotationSolver.csproj

      - name: Build Plugin
        run: dotnet build --no-restore -c Release RotationSolver/RotationSolver.csproj -p:AssemblyVersion=${{ env.tag }} -p:FileVersion=${{ env.tag }} -p:PackageVersion=${{ env.tag }} -p:InformationalVersion=${{ env.tag }} --output .\build

      - name: Generate pluginmaster.json
        shell: pwsh
        run: |
          $manifest = Get-Content RotationSolver/ascended-rotationsolverreborn.json -Raw | ConvertFrom-Json
          $downloadUrl = "https://github.com/jkleinne/ascended-rotationsolverreborn/releases/download/${{ env.tag }}/latest.zip"
          $entry = [ordered]@{
            Author                  = $manifest.Author
            Name                    = $manifest.Name
            InternalName            = $manifest.InternalName
            Description             = $manifest.Description
            Punchline               = $manifest.Punchline
            RepoUrl                 = $manifest.RepoUrl
            ApplicableVersion       = $manifest.ApplicableVersion
            DalamudApiLevel         = $manifest.DalamudApiLevel
            TestingDalamudApiLevel  = $manifest.TestingDalamudApiLevel
            Tags                    = $manifest.Tags
            CategoryTags            = $manifest.CategoryTags
            LoadRequiredState       = $manifest.LoadRequiredState
            LoadSync                = $manifest.LoadSync
            CanUnloadAsync          = $manifest.CanUnloadAsync
            LoadPriority            = $manifest.LoadPriority
            IsTestingExclusive      = $manifest.IsTestingExclusive
            IconUrl                 = $manifest.IconUrl
            AcceptsFeedback         = $manifest.AcceptsFeedback
            AssemblyVersion         = "${{ env.tag }}"
            TestingAssemblyVersion  = "${{ env.tag }}"
            DownloadLinkInstall     = $downloadUrl
            DownloadLinkTesting     = $downloadUrl
            DownloadLinkUpdate      = $downloadUrl
            DownloadCount           = 0
          }
          @($entry) | ConvertTo-Json -Depth 10 | Set-Content pluginmaster.json -NoNewline

      - name: Publish Plugin
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./build/ascended-rotationsolverreborn/latest.zip
            ./pluginmaster.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Doc Gen Tool
        run: |
          dotnet pack -c Release RotationSolver.DocumentationGenerator/RotationSolver.DocumentationGenerator.csproj
          dotnet tool restore --add-source RotationSolver.DocumentationGenerator/nupkg
      - name: Build Docs
        run: dotnet tool run docgen build/RotationSolver.Basic.xml build/RebornRotations.xml
      - name: Publish Docs
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: _doc/
          commit-message: Update wiki to ${{ env.tag }}
